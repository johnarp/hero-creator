<div class="view-settings">
  <div class="settings-section">
    <div class="settings-section-title">Export</div>
    <p>Download all your concepts as a <code>.json</code> file.</p>
    <button class="btn" onclick="exportJSON()">Export</button>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Import</div>
    <p>Import concepts from a previously exported <code>.json</code> file. Duplicates (by ID) are skipped.</p>
    <label class="btn" style="cursor:pointer;">
      Import
      <input type="file" accept=".json" onchange="importJSON(event)" style="display:none;">
    </label>
    <p id="settings-msg"></p>
  </div>
</div>

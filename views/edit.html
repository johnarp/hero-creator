<div class="action-bar">
  <button class="btn" onclick="cancelEdit()">← Cancel</button>
  <button class="btn primary" onclick="saveConcept()">💾 Save</button>
  <span id="edit-title" style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--nav-bg);opacity:0.5;"></span>
</div>

<div class="form-panel">
  <div class="form-panel-title">Hero Info</div>

  <div class="form-group">
    <label>Hero Name</label>
    <input type="text" id="edit-name" placeholder="Name">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Role</label>
      <select id="edit-role">
        <option value="Vanguard">Vanguard</option>
        <option value="Duelist">Duelist</option>
        <option value="Strategist">Strategist</option>
      </select>
    </div>
    <div class="form-group" style="flex:none;">
      <label>Difficulty <span class="hint">(# of ★)</span></label>
      <input type="number" id="edit-difficulty" min="1" value="3">
    </div>
    <div class="form-group" style="flex:none;">
      <label>Banner Color</label>
      <input type="color" id="edit-color" value="#1a1a2e">
    </div>
  </div>
</div>

<div class="edit-table">
  <div class="panel-title">Abilities</div>
  <table>
    <thead>
      <tr>
        <th class="col-button">Button</th>
        <th class="col-name">Name</th>
        <th>Description</th>
        <th class="col-del"></th>
      </tr>
    </thead>
    <tbody id="edit-abilities-body"></tbody>
  </table>
</div>
<button class="btn btn-sm add-row-btn" onclick="addRow('edit-abilities-body', 'ability')">+ Add Ability</button>

<div class="edit-table" style="margin-top:16px;">
  <div class="panel-title">Team-Ups</div>
  <table>
    <thead>
      <tr>
        <th class="col-button">Button</th>
        <th class="col-name">Name</th>
        <th>Description</th>
        <th class="col-del"></th>
      </tr>
    </thead>
    <tbody id="edit-teamups-body"></tbody>
  </table>
</div>
<button class="btn btn-sm add-row-btn" onclick="addRow('edit-teamups-body', 'teamup')">+ Add Team-Up</button>
